<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mikey's Cybersec Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-defaults.css">
  <style>
    :root {
      --base-background-color: #0f172a;
      --base-font-color: #e2e8f0;
      --sidebar-background: #1e293b;
      --theme-color: #2dd4bf;
    }
    /* Makes the sidebar look clean */
    .sidebar-nav ul { padding-left: 15px; }
  </style>
</head>
<body>
  <div id="app">Crawling the repository...</div>
  <script>
    window.$docsify = {
      name: 'Cybersec Journey',
      repo: 'https://github.com/sharma-abhi9av/Cybersec-journey',
      basePath: 'https://raw.githubusercontent.com/sharma-abhi9av/Cybersec-journey/main/',
      // We disable the manual sidebar and enable our auto-logic
      loadSidebar: false, 
      maxLevel: 4,
      subMaxLevel: 2,
      search: 'auto',
      relativePath: true,
      // The "Automatic Machine" Logic
      plugins: [
        function(hook, vm) {
          hook.init(function() {
            // This tells Docsify to wait while we fetch your folder structure
            const repo = 'sharma-abhi9av/Cybersec-journey';
            const url = `https://api.github.com/repos/${repo}/git/trees/main?recursive=1`;
            
            fetch(url)
              .then(response => response.json())
              .then(data => {
                const tree = data.tree;
                let sidebar = '* [Home](README.md)\n';
                
                // This builds the menu for every file and folder automatically
                tree.forEach(item => {
                  if (item.type === 'blob' && (item.path.endsWith('.md') || item.path.endsWith('.py') || item.path.endsWith('.cpp') || item.path.endsWith('.c'))) {
                    const pathParts = item.path.split('/');
                    const indent = '  '.repeat(pathParts.length - 1);
                    const fileName = pathParts[pathParts.length - 1];
                    sidebar += `${indent}* [${fileName}](${item.path})\n`;
                  }
                });
                
                // Inject the generated sidebar into the app
                window.$docsify.sidebar = sidebar;
              });
          });
        }
      ]
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
