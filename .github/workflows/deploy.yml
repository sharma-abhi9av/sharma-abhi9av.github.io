name: build-and-deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Content
        run: |
          rm -rf docs
          git clone https://github.com/sharma-abhi9av/Cybersec-journey.git docs

      - name: Auto-Generate Code Envelopes
        # This script creates the .md "envelopes" for all your code
        run: |
          python3 -c "
          import os
          from pathlib import Path
          extensions = ['.py', '.c', '.cpp', '.js', '.txt']
          for ext in extensions:
              for path in Path('docs').rglob(f'*{ext}'):
                  if '.git' in path.parts: continue
                  # We name the envelope 'filename.ext.md'
                  md_path = path.with_name(path.name + '.md')
                  try:
                      content = path.read_text(errors='ignore')
                      lang = ext.replace('.', '')
                      with open(md_path, 'w') as f:
                          f.write(f'# {path.name}\n\n```{lang}\n{content}\n```')
                  except Exception as e:
                      print(f'Skipping {path}: {e}')
          "

      - name: Install Dependencies
        run: pip install mkdocs-material pymdown-extensions
      
      - name: Build and Deploy
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          mkdocs gh-deploy --force --clean
