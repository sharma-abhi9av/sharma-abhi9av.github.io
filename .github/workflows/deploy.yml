name: build-and-deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Content
        run: |
          rm -rf docs
          git clone https://github.com/sharma-abhi9av/Cybersec-journey.git docs

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Auto-Generate Python Pages
        # This script finds every .py file and creates a .md file to display it
        run: |
          python3 -c "
          import os
          from pathlib import Path
          for path in Path('docs').rglob('*.py'):
              if '.git' in path.parts: continue
              md_path = path.with_suffix('.py.md')
              code = path.read_text()
              with open(md_path, 'w') as f:
                  f.write(f'# {path.name}\n\n```python\n{code}\n```')
          "

      - name: Install Dependencies
        run: pip install mkdocs-material pymdown-extensions
      
      - name: Build and Deploy
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          mkdocs gh-deploy --force --clean
