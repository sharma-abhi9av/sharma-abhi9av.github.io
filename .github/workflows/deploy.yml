name: build-and-deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Content
        run: |
          rm -rf docs
          git clone https://github.com/sharma-abhi9av/Cybersec-journey.git docs

      - name: Auto-Generate Code Pages
        run: |
          cat << 'EOF' > generate_pages.py
          import os
          import re
          from pathlib import Path

          extensions = ['.py', '.c', '.cpp', '.js', '.txt', '.sh']

          for ext in extensions:
              for path in Path('docs').rglob(f'*{ext}'):
                  if '.git' in path.parts or path.suffix == '.md':
                      continue

                  md_path = path.with_name(path.name + '.md')
                  try:
                      content = path.read_text(errors='ignore').strip()
                      lang = ext.replace('.', '')
                      description = ""
                      code = content

                      if ext == '.py':
                          match = re.match(r'^("""|\'\'\')(.*?)\1(.*?)$', content, re.DOTALL)
                          if match:
                              description = match.group(2).strip()
                              code = match.group(3).strip()

                      elif ext in ['.c', '.cpp', '.js']:
                          match = re.match(r'^/\*(.*?)\*/(.*?)$', content, re.DOTALL)
                          if match:
                              description = match.group(1).strip()
                              code = match.group(2).strip()

                      with open(md_path, 'w', encoding='utf-8') as f:
                          clean_title = path.stem
                          f.write(f'# {clean_title}\n\n')

                          if description:
                              f.write(f'## Overview\n{description}\n\n')
                              f.write('---\n\n')
                              f.write('## Code\n')
                          
                          f.write(f'```{lang}\n{code}\n```\n')

                  except Exception as e:
                      print(f'Error processing {path}: {e}')
          EOF
          python3 generate_pages.py

      - name: Install Dependencies
        run: pip install mkdocs-material pymdown-extensions mkdocs-awesome-pages-plugin

      - name: Build and Deploy
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          mkdocs gh-deploy --force --clean
